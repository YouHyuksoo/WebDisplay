<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTQ A등급 알림 미리보기</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  header {
    background: #16213e;
    border-bottom: 1px solid #2d3748;
    padding: 12px 20px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #a78bfa; }
  header span { font-size: 12px; color: #64748b; }

  .main {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }

  /* ─── Controls ─── */
  .controls {
    width: 280px;
    flex-shrink: 0;
    background: #16213e;
    border-right: 1px solid #2d3748;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #64748b;
    margin-bottom: 6px;
  }

  label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 4px; }

  select, input[type="text"], input[type="number"] {
    width: 100%;
    background: #0f172a;
    border: 1px solid #2d3748;
    border-radius: 6px;
    color: #e2e8f0;
    font-size: 12px;
    padding: 6px 8px;
    outline: none;
    transition: border-color 0.15s;
  }
  select:focus, input:focus { border-color: #6366f1; }

  .toggle-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 12px;
    color: #94a3b8;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: #334155;
    border-radius: 20px;
    transition: background 0.2s;
  }
  .toggle input:checked + .toggle-track { background: #6366f1; }
  .toggle-thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 14px; height: 14px;
    background: white;
    border-radius: 50%;
    transition: transform 0.2s;
    pointer-events: none;
  }
  .toggle input:checked ~ .toggle-thumb { transform: translateX(16px); }

  /* Lines list */
  .lines-list { display: flex; flex-direction: column; gap: 8px; }

  .line-item {
    background: #0f172a;
    border: 1px solid #2d3748;
    border-radius: 8px;
    padding: 8px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    position: relative;
  }
  .line-item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: #6366f1;
    font-weight: 600;
  }
  .remove-btn {
    background: none;
    border: none;
    color: #475569;
    cursor: pointer;
    font-size: 14px;
    line-height: 1;
    padding: 0 2px;
    transition: color 0.15s;
  }
  .remove-btn:hover { color: #ef4444; }

  .inline-row { display: flex; gap: 6px; }
  .inline-row > div { flex: 1; }

  .add-btn {
    background: #1e293b;
    border: 1px dashed #334155;
    border-radius: 8px;
    color: #64748b;
    font-size: 12px;
    cursor: pointer;
    padding: 8px;
    text-align: center;
    transition: all 0.15s;
  }
  .add-btn:hover { border-color: #6366f1; color: #a78bfa; background: #1e293b; }

  /* ─── Preview ─── */
  .preview-area {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr;
    overflow: hidden;
    min-width: 0;
  }

  .preview-col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 20px;
    gap: 10px;
  }
  .preview-col:first-child {
    background: #1e2636;
    border-right: 1px solid #2d3748;
    overflow-y: auto;
  }
  .preview-col:last-child {
    background: #151e2d;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .preview-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #475569;
    flex-shrink: 0;
  }

  /* Teams UI mock */
  .teams-window {
    width: 100%;
    background: #292929;
    border-radius: 8px;
    overflow: visible;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    flex-shrink: 0;
  }

  .teams-titlebar {
    background: #201f1f;
    padding: 8px 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .teams-dot { width: 10px; height: 10px; border-radius: 50%; }
  .teams-dot.red { background: #ff5f57; }
  .teams-dot.yellow { background: #febc2e; }
  .teams-dot.green { background: #28c840; }
  .teams-app-name {
    font-size: 11px;
    color: #888;
    margin-left: 6px;
  }

  .teams-chat {
    background: #292929;
    padding: 16px;
  }

  .teams-msg {
    display: flex;
    gap: 10px;
    margin-bottom: 4px;
  }
  .teams-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #6264a7, #8b5cf6);
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
    color: white;
  }
  .teams-bubble {
    flex: 1;
  }
  .teams-sender-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 4px;
  }
  .teams-sender { font-size: 13px; font-weight: 600; color: #e1e1e1; }
  .teams-time { font-size: 10px; color: #777; }

  /* MessageCard */
  .msg-card {
    border-left: 4px solid #ef4444;
    background: #333;
    border-radius: 4px;
    overflow: hidden;
    font-size: 13px;
  }
  .msg-card-inner { padding: 12px 14px; }

  .msg-card-title {
    font-size: 14px;
    font-weight: 700;
    color: #ffffff;
    margin-bottom: 4px;
    line-height: 1.4;
  }
  .msg-card-text {
    color: #c0c0c0;
    font-size: 12px;
    margin-bottom: 10px;
    line-height: 1.5;
  }
  .msg-card-text strong { color: #ffffff; font-weight: 700; }

  .facts-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
  }
  .facts-table tr { border-top: 1px solid #444; }
  .facts-table tr:first-child { border-top: none; }
  .facts-table td { padding: 5px 6px; vertical-align: top; }
  .facts-table td:first-child {
    color: #a0a0a0;
    font-weight: 600;
    white-space: nowrap;
    padding-right: 12px;
    width: 1%;
  }
  .facts-table td:last-child { color: #e0e0e0; }

  .grade-badge {
    display: inline-block;
    background: #ef4444;
    color: white;
    font-size: 10px;
    font-weight: 700;
    padding: 1px 6px;
    border-radius: 3px;
    margin-right: 4px;
  }
  .ng-count { color: #fbbf24; font-weight: 600; }

  .timestamp-row { color: #777; font-size: 11px; margin-top: 4px; }

  /* Teams action button */
  .msg-card-actions {
    padding: 8px 14px 10px;
    border-top: 1px solid #444;
  }
  .teams-action-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: #6264a7;
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 3px;
    text-decoration: none;
    cursor: pointer;
    border: none;
    transition: background 0.15s;
  }
  .teams-action-btn:hover { background: #7b7dbf; }

  /* JSON payload */
  .payload-area {
    width: 100%;
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .payload-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .payload-label { font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: #475569; }
  .copy-btn {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 5px;
    color: #94a3b8;
    font-size: 11px;
    padding: 3px 10px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .copy-btn:hover { border-color: #6366f1; color: #a78bfa; }
  .copy-btn.copied { border-color: #22c55e; color: #4ade80; }

  pre.payload {
    background: #0f172a;
    border: 1px solid #1e293b;
    border-radius: 8px;
    padding: 14px;
    font-family: 'Consolas', 'Fira Code', monospace;
    font-size: 11px;
    color: #7dd3fc;
    overflow: auto;
    line-height: 1.6;
    white-space: pre;
    flex: 1;
    min-height: 0;
  }

  /* Presets */
  .presets { display: flex; flex-wrap: wrap; gap: 5px; }
  .preset-btn {
    background: #1e293b;
    border: 1px solid #334155;
    border-radius: 5px;
    color: #94a3b8;
    font-size: 11px;
    padding: 4px 8px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .preset-btn:hover { border-color: #6366f1; color: #c4b5fd; }
  .preset-btn.active { border-color: #6366f1; background: #1e1b4b; color: #a78bfa; }

  .divider { border: none; border-top: 1px solid #2d3748; }
</style>
</head>
<body>

<header>
  <h1>CTQ A등급 알림 미리보기</h1>
  <span>Teams MessageCard 실제 렌더링 시뮬레이션</span>
</header>

<div class="main">

  <!-- Controls -->
  <div class="controls">

    <div>
      <div class="section-title">프리셋</div>
      <div class="presets" id="presets">
        <button class="preset-btn" onclick="applyPreset('repeat1')">반복성 1라인</button>
        <button class="preset-btn" onclick="applyPreset('repeat3')">반복성 3라인</button>
        <button class="preset-btn" onclick="applyPreset('accident1')">사고성 HIPOT</button>
        <button class="preset-btn" onclick="applyPreset('accident3')">사고성 혼합</button>
      </div>
    </div>

    <hr class="divider">

    <div>
      <div class="section-title">알림 카테고리</div>
      <label>카테고리</label>
      <select id="category" onchange="updateAll()">
        <option value="repeatability">반복성 (연속동일위치)</option>
        <option value="nonConsecutive">연속반복성 (비연속동일위치)</option>
        <option value="accident">사고성</option>
      </select>
    </div>

    <hr class="divider">

    <div>
      <div class="section-title">A등급 라인 목록</div>
      <div class="lines-list" id="linesList"></div>
      <button class="add-btn" onclick="addLine()" style="margin-top:8px">+ 라인 추가</button>
    </div>

    <hr class="divider">

    <div>
      <div class="section-title">발송 옵션</div>
      <div class="toggle-row" style="margin-bottom:8px">
        <span>발생시간 표시</span>
        <label class="toggle">
          <input type="checkbox" id="showTime" checked onchange="updateAll()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
      <div class="toggle-row">
        <span>상세 보기 버튼</span>
        <label class="toggle">
          <input type="checkbox" id="showLink" checked onchange="updateAll()">
          <div class="toggle-track"></div>
          <div class="toggle-thumb"></div>
        </label>
      </div>
    </div>

    <div>
      <div class="section-title">앱 URL (NEXT_PUBLIC_APP_URL)</div>
      <label>베이스 URL</label>
      <input type="text" id="baseUrl" value="http://localhost:3000" oninput="updateAll()">
    </div>

  </div>

  <!-- Preview: 2-column -->
  <div class="preview-area">

    <!-- 왼쪽: Teams 미리보기 -->
    <div class="preview-col">
      <div class="preview-label">Teams 채널 미리보기</div>
      <div class="teams-window">
        <div class="teams-titlebar">
          <div class="teams-dot red"></div>
          <div class="teams-dot yellow"></div>
          <div class="teams-dot green"></div>
          <span class="teams-app-name">Microsoft Teams — MES 알림 채널</span>
        </div>
        <div class="teams-chat">
          <div class="teams-msg">
            <div class="teams-avatar">S</div>
            <div class="teams-bubble">
              <div class="teams-sender-row">
                <span class="teams-sender">SOLUM MES Bot</span>
                <span class="teams-time" id="msgTime"></span>
              </div>
              <div class="msg-card">
                <div class="msg-card-inner">
                  <div class="msg-card-title" id="cardTitle"></div>
                  <div class="msg-card-text" id="cardText"></div>
                  <table class="facts-table" id="factsTable"></table>
                </div>
                <div class="msg-card-actions" id="cardActions"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- 오른쪽: JSON payload -->
    <div class="preview-col">
      <div class="payload-header">
        <span class="preview-label">전송 JSON (MessageCard)</span>
        <button class="copy-btn" id="copyBtn" onclick="copyPayload()">복사</button>
      </div>
      <div class="payload-area">
        <pre class="payload" id="jsonPayload"></pre>
      </div>
    </div>

  </div>
</div>

<script>
  const CATEGORY_LABELS = {
    repeatability:  '반복성 (연속동일위치)',
    nonConsecutive: '연속반복성 (비연속동일위치)',
    accident:       '사고성',
  };

  const CATEGORY_PATHS = {
    repeatability:  '/ctq/repeatability',
    nonConsecutive: '/ctq/non-consecutive',
    accident:       '/ctq/accident',
  };

  const PROCESS_OPTIONS = {
    repeatability:  ['FT', 'ATE'],
    nonConsecutive: ['FT', 'ATE'],
    accident:       ['HIPOT', 'BURNIN', 'ATE'],
  };

  let state = {
    category: 'repeatability',
    lines: [
      { lineName: 'SMD-L1 라인', process: 'FT', ngCount: 3 },
    ],
    showTime: true,
  };

  // ── Presets ──
  const PRESETS = {
    repeat1: {
      category: 'repeatability',
      lines: [{ lineName: 'SMD-L1 라인', process: 'FT', ngCount: 3 }],
    },
    repeat3: {
      category: 'repeatability',
      lines: [
        { lineName: 'SMD-L1 라인', process: 'FT',  ngCount: 3 },
        { lineName: 'SMD-L3 라인', process: 'ATE', ngCount: 2 },
        { lineName: 'IMD-L2 라인', process: 'FT',  ngCount: 4 },
      ],
    },
    accident1: {
      category: 'accident',
      lines: [{ lineName: 'IMD-L2 라인', process: 'HIPOT', ngCount: 1 }],
    },
    accident3: {
      category: 'accident',
      lines: [
        { lineName: 'SMD-L2 라인', process: 'HIPOT',  ngCount: 2 },
        { lineName: 'IMD-L1 라인', process: 'BURNIN', ngCount: 3 },
        { lineName: 'SMD-L4 라인', process: 'ATE',    ngCount: 2 },
      ],
    },
  };

  function applyPreset(key) {
    const p = PRESETS[key];
    state.category = p.category;
    state.lines = p.lines.map(l => ({...l}));
    document.getElementById('category').value = p.category;
    renderLineControls();
    updateAll();
    // highlight active preset
    document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
  }

  // ── Line controls ──
  function renderLineControls() {
    const cat = state.category;
    const procOpts = PROCESS_OPTIONS[cat] || ['FT', 'ATE'];
    const container = document.getElementById('linesList');
    container.innerHTML = '';

    state.lines.forEach((line, i) => {
      const div = document.createElement('div');
      div.className = 'line-item';

      const procOptsHtml = procOpts.map(p =>
        `<option value="${p}" ${line.process === p || (!procOpts.includes(line.process) && p === procOpts[0]) ? 'selected' : ''}>${p}</option>`
      ).join('');

      div.innerHTML = `
        <div class="line-item-header">
          <span>라인 ${i+1}</span>
          ${state.lines.length > 1 ? `<button class="remove-btn" onclick="removeLine(${i})">×</button>` : ''}
        </div>
        <div>
          <label>라인명</label>
          <input type="text" value="${line.lineName}" oninput="updateLine(${i},'lineName',this.value)">
        </div>
        <div class="inline-row">
          <div>
            <label>공정</label>
            <select onchange="updateLine(${i},'process',this.value)">${procOptsHtml}</select>
          </div>
          <div>
            <label>NG 건수</label>
            <input type="number" min="1" max="99" value="${line.ngCount}" oninput="updateLine(${i},'ngCount',parseInt(this.value)||1)">
          </div>
        </div>
      `;
      container.appendChild(div);
    });
  }

  function addLine() {
    const cat = state.category;
    const procOpts = PROCESS_OPTIONS[cat] || ['FT'];
    state.lines.push({ lineName: `라인 ${state.lines.length + 1}`, process: procOpts[0], ngCount: 1 });
    renderLineControls();
    updateAll();
  }

  function removeLine(i) {
    state.lines.splice(i, 1);
    renderLineControls();
    updateAll();
  }

  function updateLine(i, field, value) {
    state.lines[i][field] = value;
    if (field === 'process') renderLineControls();
    updateAll();
  }

  // ── Render preview ──
  function renderPreview() {
    const cat = state.category;
    const catLabel = CATEGORY_LABELS[cat];
    const lines = state.lines;
    const showTime = document.getElementById('showTime').checked;

    // Time
    const now = new Date();
    const timeStr = now.toLocaleString('ko-KR', {
      year: 'numeric', month: 'long', day: 'numeric',
      hour: '2-digit', minute: '2-digit', second: '2-digit'
    });
    document.getElementById('msgTime').textContent =
      now.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

    // Card title
    document.getElementById('cardTitle').textContent =
      `🚨 CTQ 이상점 A등급 감지: ${catLabel}`;

    // Card text
    document.getElementById('cardText').innerHTML =
      `<strong>${lines.length}개 라인</strong>에서 A등급 이상점이 감지되었습니다.`;

    // Facts table
    const table = document.getElementById('factsTable');
    let rows = '';
    lines.forEach(line => {
      rows += `
        <tr>
          <td>${line.lineName} [${line.process}]</td>
          <td><span class="grade-badge">A등급</span><span class="ng-count">NG ${line.ngCount}건</span></td>
        </tr>`;
    });
    if (showTime) {
      rows += `
        <tr>
          <td>발생시간</td>
          <td class="timestamp-row">${timeStr}</td>
        </tr>`;
    }
    table.innerHTML = rows;

    // Action button
    const showLink = document.getElementById('showLink').checked;
    const baseUrl = (document.getElementById('baseUrl').value || 'http://localhost:3000').replace(/\/$/, '');
    const pageUrl = baseUrl + CATEGORY_PATHS[cat];
    const actionsEl = document.getElementById('cardActions');
    if (showLink) {
      actionsEl.style.display = '';
      actionsEl.innerHTML = `<a class="teams-action-btn" href="${pageUrl}" target="_blank">↗ 상세 보기</a>`;
    } else {
      actionsEl.style.display = 'none';
      actionsEl.innerHTML = '';
    }
  }

  // ── Build JSON payload ──
  function buildPayload() {
    const cat = state.category;
    const catLabel = CATEGORY_LABELS[cat];
    const lines = state.lines;
    const showTime = document.getElementById('showTime').checked;
    const showLink = document.getElementById('showLink').checked;
    const baseUrl = (document.getElementById('baseUrl').value || 'http://localhost:3000').replace(/\/$/, '');
    const pageUrl = baseUrl + CATEGORY_PATHS[cat];

    const now = new Date().toLocaleString('ko-KR');

    const facts = lines.map(line => ({
      name: `${line.lineName} [${line.process}]`,
      value: `A등급 — NG ${line.ngCount}건`,
    }));
    if (showTime) facts.push({ name: '발생시간', value: now });

    const payload = {
      '@type': 'MessageCard',
      '@context': 'http://schema.org/extensions',
      themeColor: 'ef4444',
      summary: `[CTQ A등급] ${catLabel} — ${lines.length}개 라인`,
      sections: [{
        activityTitle: `🚨 CTQ 이상점 A등급 감지: ${catLabel}`,
        activityText: `**${lines.length}개 라인**에서 A등급 이상점이 감지되었습니다.`,
        facts,
        markdown: true,
      }],
    };

    if (showLink) {
      payload.potentialAction = [{
        '@type': 'OpenUri',
        name: '상세 보기',
        targets: [{ os: 'default', uri: pageUrl }],
      }];
    }

    return payload;
  }

  function updateAll() {
    // sync state from controls
    state.category = document.getElementById('category').value;
    state.showTime = document.getElementById('showTime').checked;
    renderPreview();
    const payload = buildPayload();
    document.getElementById('jsonPayload').textContent =
      JSON.stringify(payload, null, 2);
  }

  function copyPayload() {
    const text = document.getElementById('jsonPayload').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = '복사됨!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = '복사';
        btn.classList.remove('copied');
      }, 1500);
    });
  }

  // Init
  renderLineControls();
  updateAll();

  // Category change also re-renders line controls (process options change)
  document.getElementById('category').addEventListener('change', () => {
    state.category = document.getElementById('category').value;
    // reset process to first valid option per line
    const opts = PROCESS_OPTIONS[state.category];
    state.lines.forEach(l => {
      if (!opts.includes(l.process)) l.process = opts[0];
    });
    renderLineControls();
    updateAll();
  });
</script>
</body>
</html>
